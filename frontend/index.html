<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>ownDash</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>ownDash</h1>
    <div id="last-updated"></div>
  </header>

  <main>
    <section id="status-bar" class="card status-bar">
      <div id="status-github" class="status-chip">GitHub ...</div>
      <div id="status-k8s" class="status-chip">Cluster ...</div>
      <div id="status-plane" class="status-chip">Plane ...</div>
    </section>

    <section id="weather" class="card">
      <h2>Weather</h2>
      <div id="weather-content">Loading...</div>
    </section>

    <section id="timezones" class="card">
      <h2>Timezones</h2>
      <div id="timezone-content"></div>
    </section>

    <section id="data-tabs" class="card">
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="github" role="tab" aria-selected="true" aria-controls="tab-github" id="tab-btn-github">GitHub</button>
        <button class="tab-btn" data-tab="k8s" role="tab" aria-selected="false" aria-controls="tab-k8s" id="tab-btn-k8s">K8s</button>
        <button class="tab-btn" data-tab="plane" role="tab" aria-selected="false" aria-controls="tab-plane" id="tab-btn-plane">Plane</button>
      </div>
      <div id="tab-github" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-github"><p class="loading">Loading...</p></div>
      <div id="tab-k8s" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-k8s"><p class="loading">Loading...</p></div>
      <div id="tab-plane" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-plane"><p class="loading">Loading...</p></div>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
